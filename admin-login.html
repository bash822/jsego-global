
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-Sego Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b0f;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      background: #111117;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      color: #c9a84c;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      color: #e8e8ed;
      font-size: 22px;
      margin-bottom: 4px;
    }
    p {
      color: #686970;
      font-size: 13px;
      margin-bottom: 28px;
    }
    label {
      color: #686970;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0d0d12;
      border: 1px solid #1e1f2e;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e8ede8;
      font-size: 15px;
      margin-bottom: 20px;
      outline: none;
    }
    input:focus { border-color: #c9a84c; }
    button {
      width: 100%;
      background: linear-gradient(135deg, #2b2a6e, #1d1e52);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    .error {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">J-Sego Global Limited</div>
    <h1> Admin Login</h1>
    <p>Enter your password to access the dashboard</p>

    <label>Password</label>
    <input type="password" id="pass" placeholder="Enter password" onkeydown="if(event.key==='Enter') login()"/>

    <button onclick="login()">Sign In →</button>
    <div class="error" id="err"> Wrong password. Try again.</div>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('jsego-admin') === 'true') {
      window.location.href = 'admin.html';
    }

    function login() {
      const pass = document.getElementById('pass').value;
      // Change this to your own password
      if (pass === 'Jsego@2026') {
        sessionStorage.setItem('jsego-admin', 'true');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
  </script>
</body>
</html>
